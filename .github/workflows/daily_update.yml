name: Daily Investment Signal Update

on:
  schedule:
    # 毎日UTCの21時 (日本時間で朝の6時) に実行。米国市場終了後。
    - cron: '0 21 * * 1-5'
  workflow_dispatch: # 手動実行用

permissions:
  contents: write

jobs:
  update-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/scripts/requirements.txt
          
      - name: Run signal generation script
        run: |
          python .github/scripts/update_signals.py
          
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signals.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Auto-update daily signals [skip ci]" && git push)
